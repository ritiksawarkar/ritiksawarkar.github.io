  <text x="130" y="260" fill="#c4b5fd" font-size="30" font-family="Arial, sans-serif" letter-spacing="5">MERN PROTOTYPES AND RAPID PRODUCT BUILDS</text>
  <text x="130" y="352" fill="#dbeafe" font-size="34" font-family="Arial, sans-serif">A showcase of problem-solving products built for speed, clarity, and real-world impact.</text>
