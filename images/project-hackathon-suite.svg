<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="hackathonTitle hackathonDesc">
  <title id="hackathonTitle">Hackathon suite project artwork</title>
  <desc id="hackathonDesc">Purple and cyan showcase card for a collection of hackathon projects.</desc>
  <defs>
    <linearGradient id="hackathonBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#164e63" />
    </linearGradient>
