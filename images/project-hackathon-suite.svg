      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>
  <rect width="1400" height="900" rx="40" fill="url(#hackathonBg)" />
  <circle cx="260" cy="220" r="160" fill="#8b5cf6" fill-opacity="0.18" />
