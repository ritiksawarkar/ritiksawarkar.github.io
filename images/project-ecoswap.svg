<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="ecoswapTitle ecoswapDesc">
  <title id="ecoswapTitle">EcoSwap project artwork</title>
  <desc id="ecoswapDesc">Green branded showcase card for the EcoSwap project.</desc>
  <defs>
    <linearGradient id="ecoswapBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="55%" stop-color="#052e2b" />
      <stop offset="100%" stop-color="#14532d" />
    </linearGradient>
    <linearGradient id="ecoswapAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86efac" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
  </defs>
  <rect width="1400" height="900" rx="40" fill="url(#ecoswapBg)" />
  <circle cx="1140" cy="180" r="160" fill="#34d399" fill-opacity="0.18" />
  <circle cx="270" cy="760" r="220" fill="#14b8a6" fill-opacity="0.12" />
  <rect x="96" y="96" width="1208" height="708" rx="28" fill="#08111d" fill-opacity="0.58" stroke="#6ee7b7" stroke-opacity="0.22" />
  <text x="120" y="200" fill="#ecfeff" font-size="82" font-family="Arial, sans-serif" font-weight="700">EcoSwap</text>
  <text x="120" y="258" fill="#86efac" font-size="34" font-family="Arial, sans-serif" letter-spacing="5">SUSTAINABLE PRODUCT EXCHANGE</text>
  <text x="120" y="360" fill="#cbd5e1" font-size="34" font-family="Arial, sans-serif">Trade eco-friendly products through a clean community marketplace.</text>
  <g transform="translate(120 470)">
    <rect width="340" height="170" rx="24" fill="#0b1e1b" stroke="#34d399" stroke-opacity="0.35" />
    <text x="34" y="60" fill="#a7f3d0" font-size="24" font-family="Arial, sans-serif">Core Stack</text>
    <text x="34" y="106" fill="#f8fafc" font-size="40" font-family="Arial, sans-serif" font-weight="700">React + Node + MongoDB</text>
  </g>
  <g transform="translate(520 468)">
    <rect width="700" height="230" rx="28" fill="#071520" stroke="#2dd4bf" stroke-opacity="0.32" />
    <rect x="36" y="34" width="628" height="34" rx="17" fill="#10313a" />
    <rect x="36" y="100" width="260" height="92" rx="20" fill="url(#ecoswapAccent)" fill-opacity="0.9" />
    <rect x="322" y="100" width="160" height="92" rx="20" fill="#0f766e" />
    <rect x="508" y="100" width="156" height="92" rx="20" fill="#166534" />
  </g>
</svg>